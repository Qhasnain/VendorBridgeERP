version: '3.8'

services:
  # Relational database for production
  postgres-db:
    image: postgres:15-alpine
    container_name: vendorbridge-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: SecretPassword123!
      POSTGRES_DB: vendorbridge_prod
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Node Express API service
  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vendorbridge-api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:SecretPassword123!@postgres-db:5432/vendorbridge_prod?schema=public
      - JWT_SECRET=vendorbridge-enterprise-secret-key-987654321-core
      - JWT_REFRESH_SECRET=vendorbridge-enterprise-refresh-secret-987654321-core
    depends_on:
      - postgres-db

  # React SPA static asset host
  frontend-app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vendorbridge-client
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend-api

volumes:
  postgres_data:
